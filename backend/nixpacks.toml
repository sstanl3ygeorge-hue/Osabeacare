# Nixpacks configuration for backend
providers = ["python"]

[phases.setup]
nixPkgs = ["python311", "tesseract", "poppler_utils"]

[phases.install]
cmds = ["python -m pip install --upgrade pip", "pip install -r requirements.txt"]

[start]
cmd = "uvicorn server:app --host 0.0.0.0 --port ${PORT:-8000}"
